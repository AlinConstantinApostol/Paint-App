<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #e2e8f0; stroke: #1e293b; stroke-width: 2; }
      .line { stroke: #0f172a; stroke-width: 2; fill: none; }
      .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 8 6; }
      .active { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#ffffff"/>
  <text x="750" y="44" text-anchor="middle" class="title">Sequence Diagram - Drawing And History Registration</text>

  <g>
    <rect x="70" y="90" width="180" height="44" class="box"/>
    <text x="160" y="118" text-anchor="middle" class="label">Utilizator</text>
    <line x1="160" y1="134" x2="160" y2="900" class="dash"/>
  </g>

  <g>
    <rect x="300" y="90" width="220" height="44" class="box"/>
    <text x="410" y="118" text-anchor="middle" class="label">MainCanvasForm</text>
    <line x1="410" y1="134" x2="410" y2="900" class="dash"/>
  </g>

  <g>
    <rect x="585" y="90" width="190" height="44" class="box"/>
    <text x="680" y="118" text-anchor="middle" class="label">IDrawStrategy</text>
    <line x1="680" y1="134" x2="680" y2="900" class="dash"/>
  </g>

  <g>
    <rect x="845" y="90" width="220" height="44" class="box"/>
    <text x="955" y="118" text-anchor="middle" class="label">CommandManager</text>
    <line x1="955" y1="134" x2="955" y2="900" class="dash"/>
  </g>

  <g>
    <rect x="1130" y="90" width="200" height="44" class="box"/>
    <text x="1230" y="118" text-anchor="middle" class="label">DrawCommand</text>
    <line x1="1230" y1="134" x2="1230" y2="900" class="dash"/>
  </g>

  <rect x="400" y="180" width="20" height="560" class="active"/>
  <rect x="670" y="390" width="20" height="80" class="active"/>
  <rect x="945" y="620" width="20" height="130" class="active"/>
  <rect x="1220" y="680" width="20" height="70" class="active"/>

  <line x1="160" y1="190" x2="410" y2="190" class="line" marker-end="url(#arrow)"/>
  <text x="188" y="180" class="text">1. Select tool from toolbar</text>

  <line x1="160" y1="260" x2="410" y2="260" class="line" marker-end="url(#arrow)"/>
  <text x="190" y="250" class="text">2. MouseDown(startPoint)</text>

  <line x1="160" y1="330" x2="410" y2="330" class="line" marker-end="url(#arrow)"/>
  <text x="190" y="320" class="text">3. MouseMove(currentPoint)</text>

  <line x1="410" y1="400" x2="680" y2="400" class="line" marker-end="url(#arrow)"/>
  <text x="438" y="390" class="text">4. Draw(graphics, start, end, pen)</text>

  <line x1="160" y1="500" x2="410" y2="500" class="line" marker-end="url(#arrow)"/>
  <text x="190" y="490" class="text">5. MouseUp(endPoint)</text>

  <line x1="410" y1="570" x2="410" y2="570" class="line"/>
  <text x="434" y="575" class="text">6. Create snapshot: previousState / newState</text>

  <line x1="410" y1="650" x2="955" y2="650" class="line" marker-end="url(#arrow)"/>
  <text x="500" y="640" class="text">7. ExecuteCommand(new DrawCommand(...))</text>

  <line x1="955" y1="700" x2="1230" y2="700" class="line" marker-end="url(#arrow)"/>
  <text x="1005" y="690" class="text">8. Execute()</text>

  <line x1="1230" y1="740" x2="410" y2="740" class="line" marker-end="url(#arrow)"/>
  <text x="760" y="730" class="text">9. SetCanvasImage(newState)</text>

  <rect x="250" y="815" width="1000" height="95" rx="8" class="note"/>
  <text x="750" y="847" text-anchor="middle" class="small">This sequence captures the main workflow required by the project:</text>
  <text x="750" y="872" text-anchor="middle" class="small">user interaction on the canvas, tool strategy execution, and command registration for Undo/Redo.</text>
</svg>
