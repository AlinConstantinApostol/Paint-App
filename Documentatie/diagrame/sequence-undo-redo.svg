<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="920" viewBox="0 0 1450 920">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 15px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box { fill: #e2e8f0; stroke: #1e293b; stroke-width: 2; }
      .line { stroke: #0f172a; stroke-width: 2; fill: none; }
      .dash { stroke: #64748b; stroke-width: 1.6; stroke-dasharray: 8 6; }
      .active { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .note { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1450" height="920" fill="#ffffff"/>
  <text x="725" y="44" text-anchor="middle" class="title">Sequence Diagram - Undo / Redo</text>

  <g>
    <rect x="70" y="90" width="180" height="44" class="box"/>
    <text x="160" y="118" text-anchor="middle" class="label">Utilizator</text>
    <line x1="160" y1="134" x2="160" y2="840" class="dash"/>
  </g>

  <g>
    <rect x="320" y="90" width="220" height="44" class="box"/>
    <text x="430" y="118" text-anchor="middle" class="label">MainCanvasForm</text>
    <line x1="430" y1="134" x2="430" y2="840" class="dash"/>
  </g>

  <g>
    <rect x="620" y="90" width="220" height="44" class="box"/>
    <text x="730" y="118" text-anchor="middle" class="label">CommandManager</text>
    <line x1="730" y1="134" x2="730" y2="840" class="dash"/>
  </g>

  <g>
    <rect x="930" y="90" width="180" height="44" class="box"/>
    <text x="1020" y="118" text-anchor="middle" class="label">DrawCommand</text>
    <line x1="1020" y1="134" x2="1020" y2="840" class="dash"/>
  </g>

  <g>
    <rect x="1190" y="90" width="180" height="44" class="box"/>
    <text x="1280" y="118" text-anchor="middle" class="label">ICanvasHost</text>
    <line x1="1280" y1="134" x2="1280" y2="840" class="dash"/>
  </g>

  <rect x="420" y="190" width="20" height="540" class="active"/>
  <rect x="720" y="260" width="20" height="420" class="active"/>
  <rect x="1010" y="330" width="20" height="290" class="active"/>
  <rect x="1270" y="390" width="20" height="170" class="active"/>

  <line x1="160" y1="200" x2="430" y2="200" class="line" marker-end="url(#arrow)"/>
  <text x="205" y="190" class="text">1. Click Undo</text>

  <line x1="430" y1="270" x2="730" y2="270" class="line" marker-end="url(#arrow)"/>
  <text x="480" y="260" class="text">2. Undo()</text>

  <line x1="730" y1="340" x2="1020" y2="340" class="line" marker-end="url(#arrow)"/>
  <text x="795" y="330" class="text">3. command.Undo()</text>

  <line x1="1020" y1="400" x2="1280" y2="400" class="line" marker-end="url(#arrow)"/>
  <text x="1070" y="390" class="text">4. SetCanvasImage(previousState)</text>

  <line x1="160" y1="520" x2="430" y2="520" class="line" marker-end="url(#arrow)"/>
  <text x="205" y="510" class="text">5. Click Redo</text>

  <line x1="430" y1="590" x2="730" y2="590" class="line" marker-end="url(#arrow)"/>
  <text x="480" y="580" class="text">6. Redo()</text>

  <line x1="730" y1="650" x2="1020" y2="650" class="line" marker-end="url(#arrow)"/>
  <text x="795" y="640" class="text">7. command.Execute()</text>

  <line x1="1020" y1="710" x2="1280" y2="710" class="line" marker-end="url(#arrow)"/>
  <text x="1080" y="700" class="text">8. SetCanvasImage(newState)</text>

  <rect x="250" y="770" width="940" height="90" rx="8" class="note"/>
  <text x="720" y="802" text-anchor="middle" class="small">Undo moves the last command from the undo stack to the redo stack.</text>
  <text x="720" y="827" text-anchor="middle" class="small">Redo executes the same command again and restores the new canvas state.</text>
</svg>
